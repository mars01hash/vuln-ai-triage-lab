site_name: Vulnerability AI Triage Lab v5
site_description: Runnable AppSec AI Triage Pipeline with calibrated scoring and vector memory
site_url: https://muntasir.github.io/vuln-ai-triage-lab-v5
repo_url: https://github.com/muntasir/vuln-ai-triage-lab-v5

theme:
  name: material
  palette:
    # Hacking matrix/dark theme color scheme matching the app
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Architecture Design: doc_v5_explanation.md
  - Modules:
    - Threat Intelligence: modules/threat_intel.md
    - Reachability Analysis: modules/reachability.md
    - Model Context Protocol (MCP): modules/mcp.md
    - Audit Logging: modules/audit.md
